# ZainJo LogStream - Nginx reverse proxy configuration
# Place this in /etc/nginx/sites-available/zainjo-logstream
# and symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;   # Change to your hostname if needed

    # Redirect HTTP to HTTPS (uncomment if you have SSL)
    # return 301 https://$host$request_uri;

    # Frontend (React SPA)
    location / {
        root /opt/zainjo-logstream/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Buffer settings for log streaming
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # Logging
    access_log /var/log/nginx/zainjo-logstream.access.log;
    error_log  /var/log/nginx/zainjo-logstream.error.log;

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # Increase body size limit (for log batch uploads if needed)
    client_max_body_size 50M;
}

